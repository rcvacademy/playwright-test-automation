name: RCV Academy Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout test application code
      uses: actions/checkout@v4
      with:
        repository: rcvacademy/rcv-academy-automation-practice-app
        path: pratice-test-app
    - name: Checkout test automation code
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies in machine
      run: npm ci
    - name: Install and start test application
      working-directory: pratice-test-app
      run: |
        npm install
        npm start &
        sleep 10
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npm run test:qa
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
